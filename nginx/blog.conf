server {
    listen 80;
    server_name _;

    root /var/www/blog/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Subfolder del proxy del profesor
    location /43362480/ {
        alias /var/www/blog/dist/43362480/;
        try_files $uri $uri/ /43362480/index.html;
    }

    # Archivos estáticos (PDF, etc.) con prefijo del proxy
    location /43362480/static/ {
        alias /var/www/blog/dist/static/;
    }

    # API con prefijo del proxy → uvicorn
    location /43362480/api/ {
        rewrite ^/43362480(/api/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SSE con prefijo del proxy
    location /43362480/api/system/stream {
        rewrite ^/43362480(/api/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # API directa (sin prefijo)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/system/stream {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Archivos estáticos directos (sin prefijo)
    location /static/ {
        alias /var/www/blog/dist/static/;
    }
}
